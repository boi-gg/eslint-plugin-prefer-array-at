name: Release to npm

on:
  push:
    tags:
      - "v*"

env:
  MISE_EXPERIMENTAL: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected format: v<major>.<minor>.<patch> (e.g. v1.2.3)"
            exit 1
          fi
          echo "TAG_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Set package version from tag
        run: npm pkg set version="$TAG_VERSION"

      - name: Run CI checks
        run: mise run ci

      - name: Use latest npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Persist version bump to repository
        run: |
          npm pkg set version="$TAG_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --staged --quiet; then
            echo "package.json already up to date"
            exit 0
          fi
          git commit -m "chore: bump version to v$TAG_VERSION"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
